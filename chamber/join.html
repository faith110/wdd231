<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chamber of Commerce join page</title>
<meta name="description" content="ojochogwu faith David WDD231 Web frontend, Project chamber of commerce">
<meta name="author" content="ojochogwu faith david">
<link rel="icon" type="image/png" href="images/favicon.png">
<meta property="og:title" content="Abuja Chamber of Commerce Join Page">
<meta property="og:description" content="Welcome to the Abuja Chamber of Commerce! Connect with local businesses and entrepreneurs.">
<meta property="og:image" content="https://faith110.github.io/wdd231/chamber/images/hero.jpg">
<meta property="og:url" content="https://yourdomain.com/chamber/directory.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/small.css">
<link rel="stylesheet" href="styles/large.css">
<script src="scripts/join.js" defer></script>
</head>
<body>

<header>
    <button id="menu">☰</button>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="directory.html">Directory</a></li>
            <li><a href="join.html" class="active">Join</a></li>
            <li><a href="discover.html">Discover</a></li>
        </ul>
    </nav>
</header>

<main>

<h1>Join the Chamber</h1>

<div class="join-container">

<form method="get" action="thankyou.html">

<!-- FIRST NAME -->
<label>
First Name:
<input type="text" name="fname" required title="Enter first name" autocomplete="given-name">
</label>

<!-- LAST NAME -->
<label>
Last Name:
<input type="text" name="lname" required title="Enter last name" autocomplete="family-name">
</label>

<!-- TITLE -->
<label>
Organization Title:
<input type="text" name="orgtitle" title="Minimum 7 characters"
pattern="[A-Za-z\s\-]{7,}" autocomplete="organization-title">
</label>

<!-- EMAIL -->
<label>
Email:
<input type="email" name="email" required 
title="Enter a valid email address" 
placeholder="example@email.com" 
autocomplete="email">
</label>

<!-- PHONE -->
<label>
Mobile Phone:
<input type="tel" name="phone" required 
title="Enter your mobile phone number" 
autocomplete="tel">
</label>

<!-- BUSINESS -->
<label>
Organization Name:
<input type="text" name="business" required 
title="Enter your business or organization name" 
autocomplete="organization">
</label>

<!-- MEMBERSHIP -->
<label>
Membership Level:
<select name="membership">
<option value="np">NP Membership</option>
<option value="bronze">Bronze</option>
<option value="silver">Silver</option>
<option value="gold">Gold</option>
</select>
</label>

<!-- DESCRIPTION -->
<label>
Organization Description:
<textarea name="description" 
title="Describe your business or organization"></textarea>
</label>

<!-- TIMESTAMP -->
<input type="hidden" id="timestamp" name="timestamp">

<input type="submit" value="Apply Now">

</form>


<!-- MEMBERSHIP CARDS -->
<div class="cards">

<div class="card">
<h3>NP Membership</h3>
<a href="#" class="modal-link" data-modal="npModal">Learn More</a>
</div>

<div class="card">
<h3>Bronze</h3>
<a href="#" class="modal-link" data-modal="bronzeModal">Learn More</a>
</div>

<div class="card">
<h3>Silver</h3>
<a href="#" class="modal-link" data-modal="silverModal">Learn More</a>
</div>

<div class="card">
<h3>Gold</h3>
<a href="#" class="modal-link" data-modal="goldModal">Learn More</a>
</div>

</div>

</div>

<!-- MODALS -->
<dialog id="npModal">
  NP Membership - Free for nonprofits 
  <button class="close-btn">Close</button>
</dialog>

<dialog id="bronzeModal">
  Bronze Benefits 
  <button class="close-btn">Close</button>
</dialog>

<dialog id="silverModal">
  Silver Benefits 
  <button class="close-btn">Close</button>
</dialog>

<dialog id="goldModal">
  Gold Benefits 
  <button class="close-btn">Close</button>
</dialog>
</main>

<footer>
<p>&copy; <span id="year"></span></p>
</footer>

</body>
</html>
